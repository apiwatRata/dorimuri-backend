input SignUpUser {
    username: String!
    birth_date: String!,
    email: String!,
    password: String!,
    sex: Int!,
}

type User {
    id: String!,
    username: String!,
    birth_date: String!,
    email: String!,
    sex: Int!,
}

type Query {
    getUsers: [User]!
}

type Mutation {
    signUp(data: SignUpUser!): User!
}